# Modified from GitHub Actions template

name: QA

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
  merge_group:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_sha|| github.ref }}
  cancel-in-progress: true

jobs:
  Pytest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
          persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: true
        version: "0.11.8"
    - name: Install model
      run: USE_CYTHON=1 uv sync --frozen --extra dev
    - name: Cache ParCa simulation data
      id: cache-parca
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
      with:
        path: out/kb/*.cPickle
        key: parca-${{ hashFiles('reconstruction/ecoli/**/*.py', 'reconstruction/ecoli/**/*.tsv') }}
    - name: Run ParCa
      if: steps.cache-parca.outputs.cache-hit != 'true'
      run: |
        uv run --env-file .env runscripts/parca.py \
          --config configs/gha_pytest.json
    - name: Extract tetracycline gene regulation parameters
      run: |
        uv run --env-file .env data/marA_binding/get_TU_ID.py \
          -s out/kb/simData.cPickle
    - name: Test with pytest
      run: |
        uv run --env-file .env pytest --durations=0
  Mypy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
          persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: true
        version: "0.11.8"
    - name: Install model
      run: USE_CYTHON=1 uv sync --frozen --extra dev
    - name: Mypy
      run: |
        uv run mypy
  Lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
          persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: true
        version: "0.11.8"
    - name: Install model
      run: USE_CYTHON=1 uv sync --frozen --extra dev
    - name: Ruff
      run: |
        uv run ruff check doc ecoli wholecell runscripts validation reconstruction

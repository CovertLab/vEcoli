name: pip-audit

permissions:
  contents: read

on:
  schedule:
    - cron: '00 00 * * *'
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
          version: "0.10.6"

      - name: Audit dependencies and identify vulnerabilities
        run: |
          # Export requirements for pip-audit to analyze
          uv export --all-extras --format requirements-txt --no-emit-project > requirements.txt
          
          # Run pip-audit but don't fail if vulnerabilities are found
          uvx pip-audit -r requirements.txt --disable-pip --desc off --format json > pip_audit_results.txt || true
      
      - name: Process audit information
        run: |
          # Avoid downloading and installing entire project and all dependencies
          uv run --no-sync --isolated --with packaging runscripts/debug/process_vulnerabilities.py pip_audit_results.txt

      - name: Apply package updates
        run: |
          ./apply_security_upgrades.sh

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet uv.lock; then
            echo "No changes to uv.lock, skipping PR creation"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          git checkout -B security-updates
          git add uv.lock
          git commit -m "fix(security): update package versions"
          git push -f origin security-updates
          PR_NUMBER=$(gh pr list --head security-updates --state open --json number --jq '.[0].number')
          if echo "$PR_NUMBER" | grep -q '^[0-9]'; then
            gh pr edit "$PR_NUMBER" \
              --body-file vulnerability_report.md
          else
            gh pr create \
              --title "Security updates" \
              --body-file vulnerability_report.md \
              --head security-updates \
              --base master
          fi
